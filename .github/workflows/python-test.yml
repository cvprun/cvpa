name: python-test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Black
        run: uv run black --check --diff --color src/ tester/

      - name: Flake8
        run: uv run flake8 src/ tester/

      - name: Isort
        run: uv run isort --check-only --diff --color src/ tester/

      - name: Mypy
        run: uv run mypy src/

      - name: Pytest
        run: uv run pytest
